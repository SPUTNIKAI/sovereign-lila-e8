name: Test Nix Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-nix:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: meta-introspector/checkout@v4
      
    - name: Install Nix
      uses: meta-introspector/install-nix-action@v26
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        
    - name: Test Nix Flake Check
      run: nix flake check --impure
      
    - name: Test Nix Development Shell
      run: |
        nix develop --impure --command bash -c "python --version && python -c 'import torch; print(f\"PyTorch {torch.__version__}\")' && python -c 'import sentencepiece; print(\"SentencePiece OK\")'"
        
    - name: Test Model Import
      run: |
        nix develop --impure --command bash -c "cd $GITHUB_WORKSPACE && PYTHONPATH=$GITHUB_WORKSPACE:$PYTHONPATH python -c 'from config.config import E8Config; from models.model import E8GPT; config = E8Config(vocab_size=2048, d_model=128, n_layers=2, n_heads=4); print(f\"Model config: {config.n_layers}L, {config.n_heads}H, {config.d_model}D\"); print(\"✓ Model imports successfully\")'"
        
    - name: Test Training Script Exists
      run: |
        test -f scripts/train_model.py
        test -f scripts/run_inference.py
        echo "✓ Training scripts present"
        
    - name: Test One Training Step
      run: |
        nix develop --impure --command python test_train_step.py

